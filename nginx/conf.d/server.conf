# =============================================================================
# BookDock Nginx - Server Configuration
# =============================================================================
# Proxies:
#   /api/*      → API Server (port 3000)
#   /ws/*       → WebSocket (port 3000)
#   /tts/*      → TTS Service (port 5000)
#   /audio/*    → Static audio files (NAS_AUDIO_PATH)
#   /covers/*   → Book cover images
# =============================================================================

# ── Rate Limiting ─────────────────────────────────────────────────────────────
limit_req_status 429;
limit_conn_status 429;

# ── BookDock API Server ───────────────────────────────────────────────────────
upstream api_backend {
    server api:3000 max_fails=3 fail_timeout=30s;
    keepalive 32;
}

# ── TTS Service ────────────────────────────────────────────────────────────────
upstream tts_backend {
    server tts:5000 max_fails=3 fail_timeout=30s;
    keepalive 16;
}

# ── Main HTTP Server ─────────────────────────────────────────────────────────
server {
    listen 80;
    server_name _;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' wss: https:; media-src 'self' https:;" always;

    # Health check endpoint (bypasses proxy)
    location = /health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }

    # ── API Proxy ──────────────────────────────────────────────────────────────
    location /api/ {
        limit_req zone=api burst=20 nodelay;

        proxy_pass http://api_backend;
        proxy_hide_header X-Powered-By;
        add_header X-API-Version "1.0" always;

        # Long timeouts for file operations
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }

    # ── WebSocket Proxy ─────────────────────────────────────────────────────────
    location /ws/ {
        proxy_pass http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }

    # ── TTS Proxy ──────────────────────────────────────────────────────────────
    location /tts/ {
        limit_req zone=api burst=10 nodelay;
        proxy_pass http://tts_backend/;
        proxy_read_timeout 300s;  # TTS synthesis can take a while
    }

    # ── Static Audio Files (TTS output) ─────────────────────────────────────────
    location /audio/ {
        # Map to NAS_AUDIO_PATH via docker volume
        alias /data/audio/;
        expires 1y;
        add_header Cache-Control "public, immutable";

        # Audio file types
        mp3_flac_ogg {
            mp3;
            flac;
            ogg;
        }

        # CORS for audio streaming
        add_header Access-Control-Allow-Origin "*";
        add_header Access-Control-Expose-Headers "Content-Length,Content-Range";
    }

    # ── Book Covers ─────────────────────────────────────────────────────────────
    location /covers/ {
        alias /data/covers/;
        expires 30d;
        add_header Cache-Control "public";
    }

    # ── Static Web UI (if serving from this container) ──────────────────────────
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # ── Let's Encrypt / Certbot ────────────────────────────────────────────────
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
}

